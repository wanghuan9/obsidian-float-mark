name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate tag version
        run: |
          TAG="${GITHUB_REF_NAME}"
          node -e 'const fs = require("fs"); const version = JSON.parse(fs.readFileSync("manifest.json", "utf8")).version; if (version !== process.env.TAG) { throw new Error("manifest.json version " + version + " does not match tag " + process.env.TAG); }'
        env:
          TAG: ${{ github.ref_name }}

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" main.js manifest.json styles.css \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" \
            --generate-notes \
            --verify-tag

      - name: Attest release assets
        uses: actions/attest@v4
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css
